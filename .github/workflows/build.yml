name: build

# Manual button + version tags. A standard GitHub-hosted runner (no GPU) builds two flavors:
# a slim CPU-only zip (Win/Linux/macOS) and the fat GPU zip (Win/Linux + CUDA). The heavy deps
# (onnxruntime, the Rider SDK) download onto the runner, never into the repo.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required to attach the zips to a Release on tag builds

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        variant: [cpu, gpu]   # cpu = onnxruntime (~110 MB); gpu = onnxruntime_gpu (~0.5 GB)
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'   # Gradle 8.13 can't run on JDK 24+; the plugin targets JBR 21

      - name: Set up Gradle (cached)
        uses: gradle/actions/setup-gradle@v4

      # Tag `v1.2.3` -> plugin version 1.2.3; a manual run -> a distinct dev version.
      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "$GITHUB_REF_TYPE" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0-dev.${GITHUB_RUN_NUMBER}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build plugin (${{ matrix.variant }})
        shell: bash
        run: |
          chmod +x ./gradlew
          GPU=$([ "${{ matrix.variant }}" = "gpu" ] && echo true || echo false)
          ./gradlew buildPlugin -PpluginVersion=${{ steps.ver.outputs.version }} -Pgpu=$GPU
          # Tag the zip with its variant so cpu + gpu can coexist on one Release.
          cd build/distributions
          for f in *.zip; do mv "$f" "${f%.zip}-${{ matrix.variant }}.zip"; done

      # Ad-hoc manual builds: grab the zip from the run page. Short retention so the large
      # gpu artifact doesn't pile up against the free Actions storage quota.
      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: semantic-code-search-${{ matrix.variant }}
          path: build/distributions/*.zip
          retention-days: 5

      # Tag builds (e.g. `git tag v0.5.0 && git push github v0.5.0`): both flavors land on the
      # Release. Release assets are stored separately from the Actions artifact quota.
      - name: Publish to Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/distributions/*.zip
